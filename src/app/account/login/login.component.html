<mat-card class="card">
    <mat-card-header>
      <div mat-card-avatar class="header-image"></div>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Welcome Back</mat-card-subtitle>
    </mat-card-header>
    <mat-divider></mat-divider>    
    <form (submit)="Login()">
      <mat-card-content>
          <mat-form-field appearance="outline">
              <mat-label>Mobile No.</mat-label>
              <input matInput name="Mobile_No" [(ngModel)]="Mobile_No" required>
          </mat-form-field><br>
          <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>
              <input matInput name="Pass" [(ngModel)]="Password" [type]="hide ? 'password' : 'text'" required>
              <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                  <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button class="Btn"  color="primary">Login</button><br><br>
        <button mat-button class="Btn" color="primary">Forgate Password</button>
      </mat-card-actions>
    </form>
  </mat-card>
